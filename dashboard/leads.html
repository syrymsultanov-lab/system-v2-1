<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявки — system v2</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
<div id="app-header"></div>

<main class="main">
  <div class="welcome">
    <div>
      <h2>Заявки с лендинга</h2>
      <p>Входящие заявки партнёров. Квалификация, статусы, передача AI. Лиды попадают сюда <b>только через форму</b> sairateam.com.</p>
    </div>
    <div class="welcome-r"><div class="wdate" id="leads-total-date">Всего: <b id="stat-total">0</b></div></div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-top"><div class="sc-icon si1">🆕</div></div><div class="sc-val" id="stat-new">0</div><div class="sc-lbl">Новые</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon si2">📞</div></div><div class="sc-val" id="stat-contacted">0</div><div class="sc-lbl">В работе</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon si3">✅</div></div><div class="sc-val" id="stat-qualified">0</div><div class="sc-lbl">Квалифицированы</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon si4">🏆</div></div><div class="sc-val" id="stat-converted">0</div><div class="sc-lbl">Конверсия</div></div>
  </div>

  <div class="pnl">
    <div class="pnl-h">
      <div class="pnl-t">📋 Список заявок</div>
      <div class="pnl-tabs" id="leads-filter">
        <button class="pt active" data-f="all">Все</button>
        <button class="pt" data-f="new">Новые</button>
        <button class="pt" data-f="contacted">В работе</button>
        <button class="pt" data-f="qualified">Квал.</button>
        <button class="pt" data-f="converted">Конверсия</button>
        <button class="pt" data-f="rejected">Отказ</button>
      </div>
    </div>
    <div class="sch">
      <input type="text" id="leads-search" class="sch-i" placeholder="🔍 Поиск по имени, телефону, email, городу…">
    </div>
    <div class="tl" id="leads-list"></div>
    <div class="leads-empty" id="leads-empty" style="display:none">
      <div class="stub-icon">📭</div>
      <p>По выбранным фильтрам заявок нет.</p>
    </div>
  </div>
</main>

<!-- Lead Detail Modal -->
<div class="modal" id="lead-modal">
  <div class="modal-backdrop" onclick="closeLeadModal()"></div>
  <div class="modal-box">
    <button class="modal-close" onclick="closeLeadModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
initDashboard('leads');
requireAuth();

let LEADS = [];
let currentPartner = null;

const STATUS_MAP = {
  new:        { label:'Новая',          tg:'tg1', dot:'da', icon:'🆕' },
  contacted:  { label:'В работе',       tg:'tg2', dot:'ds', icon:'📞' },
  qualified:  { label:'Квалифицирован', tg:'tg3', dot:'dg', icon:'✅' },
  converted:  { label:'Конверсия',      tg:'tg-g',dot:'dsun',icon:'🏆' },
  rejected:   { label:'Отказ',          tg:'tg-r',dot:'dc', icon:'❌' },
};

const MSG_MAP = {
  whatsapp:  { label:'WhatsApp',  icon:'🟢' },
  telegram:  { label:'Telegram',  icon:'✈️' },
  instagram: { label:'Instagram', icon:'📷' },
  viber:     { label:'Viber',     icon:'🟣' },
  email:     { label:'Email',     icon:'✉️' },
};

let currentFilter = 'all';
let currentSearch = '';

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
  ));
}
function fmtDate(iso) {
  if (!iso) return '';
  return iso.slice(0,10).replace(/-/g,'.');
}

function renderStats() {
  const by = s => LEADS.filter(l => l.status === s).length;
  document.getElementById('stat-total').textContent = LEADS.length;
  document.getElementById('stat-new').textContent = by('new');
  document.getElementById('stat-contacted').textContent = by('contacted');
  document.getElementById('stat-qualified').textContent = by('qualified');
  document.getElementById('stat-converted').textContent = by('converted');
}

function renderLeads() {
  const list = document.getElementById('leads-list');
  const empty = document.getElementById('leads-empty');
  const q = currentSearch.toLowerCase().trim();

  const filtered = LEADS.filter(l => {
    if (currentFilter !== 'all' && l.status !== currentFilter) return false;
    if (!q) return true;
    const hay = `${l.name||''} ${l.last_name||''} ${l.phone||''} ${l.email||''} ${l.city||''}`.toLowerCase();
    return hay.includes(q);
  });

  renderStats();

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(l => {
    const st = STATUS_MAP[l.status] || STATUS_MAP.new;
    const ms = MSG_MAP[l.messenger] || { label:l.messenger||'—', icon:'💬' };
    return `
      <div class="ti lead-ti" onclick="openLeadModal('${l.id}')">
        <div class="tdot ${st.dot}"></div>
        <div class="ti-b">
          <div class="ti-t">${esc(l.name)} ${esc(l.last_name||'')} <span class="lead-city">· ${esc(l.city||'—')}</span></div>
          <div class="ti-m">${ms.icon} ${esc(l.messenger_handle||'—')} · ${esc(l.phone||'')} · ${fmtDate(l.created_at)}</div>
        </div>
        <div class="tg ${st.tg}">${st.icon} ${st.label}</div>
      </div>`;
  }).join('');
}

async function loadLeads() {
  const list = document.getElementById('leads-list');
  try {
    currentPartner = await getCurrentPartner();
    if (!currentPartner) {
      list.innerHTML = '<div class="leads-empty"><p>Партнёр не найден. Обратитесь к администратору.</p></div>';
      return;
    }
    LEADS = await sb('GET', `leads?partner_id=eq.${currentPartner.id}&select=*&order=created_at.desc`);
    renderLeads();
  } catch (e) {
    console.error('loadLeads:', e);
    list.innerHTML = `<div class="leads-empty"><p>Ошибка загрузки: ${esc(e.message)}</p></div>`;
  }
}

// ===== Filter / Search =====
document.getElementById('leads-filter').addEventListener('click', e => {
  const btn = e.target.closest('.pt');
  if (!btn) return;
  document.querySelectorAll('#leads-filter .pt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.f;
  renderLeads();
});
document.getElementById('leads-search').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderLeads();
});

// ===== Modal =====
function openLeadModal(id) {
  const l = LEADS.find(x => x.id === id);
  if (!l) return;
  const st = STATUS_MAP[l.status] || STATUS_MAP.new;
  const ms = MSG_MAP[l.messenger] || { label:l.messenger||'—', icon:'💬' };
  const initials = `${(l.name||'?')[0]}${(l.last_name||'')[0]||''}`;
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="modal-head">
      <div class="la lead-ava">${esc(initials)}</div>
      <div>
        <div class="modal-ttl">${esc(l.name)} ${esc(l.last_name||'')}</div>
        <div class="modal-sub">${esc(l.city||'—')}, ${esc(l.country||'—')} · заявка от ${fmtDate(l.created_at)}</div>
      </div>
      <div class="tg ${st.tg}" style="margin-left:auto">${st.icon} ${st.label}</div>
    </div>
    <div class="modal-grid">
      <div class="mg-row"><span class="mg-k">📱 Телефон</span><a class="mg-v" href="tel:${esc(l.phone||'')}">${esc(l.phone||'—')}</a></div>
      <div class="mg-row"><span class="mg-k">✉️ Email</span><a class="mg-v" href="mailto:${esc(l.email||'')}">${esc(l.email||'—')}</a></div>
      <div class="mg-row"><span class="mg-k">${ms.icon} Мессенджер</span><span class="mg-v">${ms.label} — ${esc(l.messenger_handle||'—')}</span></div>
      <div class="mg-row"><span class="mg-k">🌍 Локация</span><span class="mg-v">${esc(l.city||'—')}, ${esc(l.country||'—')}</span></div>
      <div class="mg-row"><span class="mg-k">📥 Источник</span><span class="mg-v">${esc(l.source||'—')}</span></div>
      <div class="mg-row"><span class="mg-k">✅ Согласие</span><span class="mg-v">${l.consent ? 'Да · ' + fmtDate(l.consent_at) : 'Нет'}</span></div>
    </div>
    <div class="modal-actions">
      <button class="mbtn mbtn-p" onclick="changeStatus('${l.id}','contacted')">📞 В работу</button>
      <button class="mbtn mbtn-g" onclick="changeStatus('${l.id}','qualified')">✅ Квалифицировать</button>
      <button class="mbtn mbtn-gold" onclick="changeStatus('${l.id}','converted')">🏆 Конверсия</button>
      <button class="mbtn mbtn-r" onclick="changeStatus('${l.id}','rejected')">❌ Отказ</button>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button class="mbtn mbtn-ai" onclick="handAiDraft('${l.id}')">🤖 AI-черновик</button>
      <button class="mbtn mbtn-msg" onclick="openChat('${l.id}')">💬 Открыть переписку</button>
    </div>
  `;
  document.getElementById('lead-modal').classList.add('active');
}
function closeLeadModal() {
  document.getElementById('lead-modal').classList.remove('active');
}
async function changeStatus(id, newStatus) {
  const l = LEADS.find(x => x.id === id);
  if (!l) return;
  const prev = l.status;
  l.status = newStatus;
  renderLeads();
  openLeadModal(id);
  try {
    await sb('PATCH', `leads?id=eq.${id}`, { status: newStatus, updated_at: new Date().toISOString() });
  } catch (e) {
    console.error('changeStatus:', e);
    l.status = prev;
    renderLeads();
    openLeadModal(id);
    showToast('❌ Не удалось сохранить статус: ' + e.message);
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLeadModal();
});

function showToast(msg) {
  let t = document.getElementById('app-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'app-toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.remove('show'), 2800);
}

function handAiDraft(id) {
  const l = LEADS.find(x => x.id === id);
  if (!l) return;
  showToast(`🤖 Запрос черновика для ${l.name}. AI подготовит текст для вашего одобрения.`);
}

function openChat(id) {
  showToast('💬 Страница переписки появится после реализации lead.html?id=' + id);
}

loadLeads();
</script>
</body>
</html>
