<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — system v2</title>
  <meta name="description" content="Вход в личный кабинет партнёра system v2">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #0B3D2E 0%, #0E1A2B 100%);
      display: flex;
      flex-direction: column;
    }

    .login-nav {
      height: var(--nav-height);
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid rgba(168, 197, 188, 0.1);
    }

    .login-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: rgba(14, 26, 43, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(168, 197, 188, 0.15);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: #F2F4F3;
      margin-bottom: 32px;
      display: block;
    }

    .login-logo span { color: #A8C5BC; }

    .login-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 400;
      color: #F2F4F3;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: #8A9BA8;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      background: rgba(168, 197, 188, 0.05);
      border: 1px solid rgba(168, 197, 188, 0.2);
      border-radius: 8px;
      padding: 14px 16px;
      color: #F2F4F3;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .input-group input:focus {
      border-color: #A8C5BC;
    }

    .input-group input::placeholder {
      color: rgba(242, 244, 243, 0.3);
    }

    .input-group.password-group input {
      padding-right: 48px;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #8A9BA8;
      background: none;
      border: none;
      font-size: 18px;
      padding: 0;
      line-height: 1;
      transition: color 0.3s;
    }

    .toggle-password:hover { color: #A8C5BC; }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #C97D4E;
      cursor: pointer;
      flex-shrink: 0;
    }

    .remember-row label {
      font-size: 13px;
      color: #8A9BA8;
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      background: #C97D4E;
      color: #F2F4F3;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }

    .btn-login:hover { background: #b56d3f; transform: translateY(-1px); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #E74C3C;
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
      text-align: center;
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #8A9BA8;
      transition: color 0.3s;
    }

    .forgot-link:hover { color: #A8C5BC; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: rgba(168, 197, 188, 0.3);
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(168, 197, 188, 0.15);
    }

    .no-access-text {
      text-align: center;
      font-size: 13px;
      color: #8A9BA8;
      margin-bottom: 12px;
    }

    .btn-request {
      width: 100%;
      background: transparent;
      color: #A8C5BC;
      border: 1px solid rgba(168, 197, 188, 0.3);
      border-radius: 8px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      display: block;
    }

    .btn-request:hover {
      border-color: #A8C5BC;
      background: rgba(168, 197, 188, 0.05);
    }

    .login-footer {
      padding: 24px;
      text-align: center;
      border-top: 1px solid rgba(168, 197, 188, 0.1);
    }

    .login-footer p {
      font-size: 12px;
      color: rgba(138, 155, 168, 0.6);
    }

    .login-footer a {
      color: #8A9BA8;
      transition: color 0.3s;
    }

    .login-footer a:hover { color: #A8C5BC; }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body class="login-page">

<!-- ===== NAV ===== -->
<nav class="login-nav">
  <div class="login-nav-inner">
    <a href="index.html" class="nav-logo">system <span>v2</span></a>
    <a href="index.html" class="btn-cabinet">На главную</a>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<main class="login-main">
  <div class="login-card">
    <span class="login-logo">system <span>v2</span></span>
    <h1>Вход в систему</h1>
    <p class="login-subtitle">Введите данные для входа</p>

    <form id="login-form" novalidate>
      <div class="input-group">
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email партнёра"
          autocomplete="email"
          required
        >
      </div>

      <div class="input-group password-group">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Пароль"
          autocomplete="current-password"
          required
        >
        <button type="button" class="toggle-password" id="toggle-pwd" aria-label="Показать пароль">👁</button>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Запомнить меня</label>
      </div>

      <button type="submit" class="btn-login" id="login-btn">Войти</button>
      <p class="error-msg" id="error-msg"></p>
    </form>

    <a href="#" class="forgot-link">Забыли пароль?</a>

    <div class="divider">или</div>

    <p class="no-access-text">Нет доступа к системе?</p>
    <a href="index.html#join" class="btn-request">Запросить доступ</a>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="login-footer">
  <p>© 2026 system v2 &nbsp;·&nbsp; <a href="legal.html">Юридическая информация</a></p>
</footer>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const SUPABASE_URL = 'https://ujtjclrvanonwcwtiequ.supabase.co'
  const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || ''

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // Редирект если уже авторизован
  const { data: { user } } = await supabase.auth.getUser()
  if (user) window.location.href = '../dashboard/index.html'

  // Показать/скрыть пароль
  document.getElementById('toggle-pwd').addEventListener('click', () => {
    const pwd = document.getElementById('password')
    pwd.type = pwd.type === 'password' ? 'text' : 'password'
  })

  // Форма входа
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault()
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn = document.getElementById('login-btn')
    const errMsg = document.getElementById('error-msg')

    errMsg.textContent = ''
    btn.textContent = 'Входим...'
    btn.disabled = true

    const { error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      errMsg.textContent = 'Неверный email или пароль. Попробуйте снова.'
      btn.textContent = 'Войти'
      btn.disabled = false
    } else {
      window.location.href = '../dashboard/index.html'
    }
  })
</script>
</body>
</html>
